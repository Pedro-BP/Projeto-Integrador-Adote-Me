<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="logoAdote_me.png" type="image/x-icon" />
    <title>Adote-Me</title>
    <script>
      (function () {
        var tema = localStorage.getItem("adoteme_tema");
        var escuro =
          tema === "escuro" ||
          (!tema && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (escuro) document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
